<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--Name-->
<label for="name">Name*</label>
<input type="text" name="" id="name"><br><br>

    <!--Address-->

<label for="address">Address</label>
<input type="text" name="" id="address"><br><br>

    <!--Zipcode-->

<label for="zipcode">Zip Code*</label>
<input type="text" name="" id="zipcode" placeholder="enter a 5-digit code"><br><br>

    <!--Country-->

<label for="country*">Country*</label>
<select name="" id="country">
<option value="">India</option>
<option value="">Russia</option>
<option value="">Afganistan</option>
<option value="">USA</option>
<option value="">Japan</option>
</select><br><br>

     <!--Gender-->

<label for="gender">Gender*</label>
<input type="radio" id="gender" name="gender"><label>Male</label>
<input type="radio" id="gender" name="gender"><label>Female</label><br><br>

     <!--Preferences-->

<label for="Preferences">Preferences*</label>
<input type="checkbox" id="gender" ><label>Red</label>
<input type="checkbox" id="gender"><label>Green</label>
<input type="checkbox" id="gender"><label>Blue</label><br><br>

    <!--Phone-->

<label for="phone">Phone*</label>
<input type="tel"  id="phone" minlength="10" maxlength="10"><br><br>

    <!--Email-->

<label for="email">Email*</label>
<input type="email"  id="email"><br><br>

    <!--Password--> 

<label for="password">Password*</label>
<input type="password"  id="password"><br><br>

    <!--VerifyPassword-->

<label for="Vpassword">Verify Password*</label>
<input type="password"  id="Vpassword"><br><br>

    <!--Brithday-->

<label for="bday">Birthday*</label>
<input type="date" name="" id="bday"><br><br>

    <!--Appointment-->

<label for="appointment">Appointment*</label>
<input type="time" name="" id="appointment"><br><br>

<button>SEND</button>
<button>CLEAR</button>

</body>
</html>
