<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>7-Eleven Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">7-ELEVEN</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Offers</a>
      <a href="#">Stores</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Always Open. Always Fresh.</h1>
    <p>Snacks, drinks & more — anytime.</p>
    <button>Explore Now</button>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Popular Items</h2>
    <div class="cards">
      <div class="card">Slurpee</div>
      <div class="card">Coffee</div>
      <div class="card">Snacks</div>
    </div>
  </section>

  <!-- Promo -->
  <section class="promo">
    <h2>Special Deals</h2>
    <p>Buy 1 Get 1 Free this weekend!</p>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 7-Eleven Clone</p>
  </footer>

</body>
</html>
