<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Step Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  
  <div class="sidebar">
    <div class="step active">
      <span>1</span>
      <div>
        <p>STEP 1</p>
        <h4>YOUR INFO</h4>
      </div>
    </div>

    <div class="step">
      <span>2</span>
      <div>
        <p>STEP 2</p>
        <h4>SELECT PLAN</h4>
      </div>
    </div>

    <div class="step">
      <span>3</span>
      <div>
        <p>STEP 3</p>
        <h4>ADD-ONS</h4>
      </div>
    </div>

    <div class="step">
      <span>4</span>
      <div>
        <p>STEP 4</p>
        <h4>SUMMARY</h4>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>Personal info</h2>
    <p class="desc">Please provide your name, email, address, and phone number.</p>

    <form>
      <label>Name</label>
      <input type="text" placeholder="e.g: Hamza Ali">

      <label>Email Address</label>
      <input type="email" placeholder="e.g: vvvvviii@gmail.com">

      <label>Phone Number</label>
      <input type="text" placeholder="e.g: +91 999 555 0990">

      <button type="submit">Next Step</button>
    </form>
  </div>

</div>

</body>
</html>
