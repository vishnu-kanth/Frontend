<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<form action="">

<label for="name">Name*</label>
<input type="text" id="name" required><br><br>

<label for="address">Address</label>
<input type="text" id="address"><br><br>

<label for="zipcode">Zip Code*</label>
<input type="text" id="zipcode" minlength="5" maxlength="5" placeholder="enter a 5-digit code" required><br><br>

<label for="country">Country*</label>
<select id="country" required>
<option value="">Select Country</option>
<option>India</option>
<option>Russia</option>
<option>Afghanistan</option>
<option>USA</option>
<option>Japan</option>
</select><br><br>

<label>Gender*</label>
<input type="radio" name="gender" value="male" required> <label>Male</label>
<input type="radio" name="gender" value="female" required> <label>Female</label><br><br>

<label>Preferences*</label>
<input type="checkbox" name="color" value="red" required> <label>Red</label>
<input type="checkbox" name="color" value="green"> <label>Green</label>
<input type="checkbox" name="color" value="blue"> <label>Blue</label><br><br>

<label for="phone">Phone*</label>
<input type="tel" id="phone" minlength="10" maxlength="10" required><br><br>

<label for="email">Email*</label>
<input type="email" id="email" required><br><br>

<label for="password">Password*</label>
<input type="password" id="password" required><br><br>

<label for="Vpassword">Verify Password*</label>
<input type="password" id="Vpassword" required><br><br>

<label for="bday">Birthday*</label>
<input type="date" id="bday" required><br><br>

<label for="appointment">Appointment*</label>
<input type="time" id="appointment" required><br><br>

<button type="submit">SEND</button>
<button type="reset">CLEAR</button>

</form>

</body>
</html>
