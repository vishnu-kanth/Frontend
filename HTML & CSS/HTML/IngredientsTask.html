    <!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>List</title>
            <style>

                .items
    {
        color: orange;
    }
    .chicken
    {
        color:black;
    }
    #paneer
    {
        color: aqua;
    }

    #lassi
    {
        color: green;
    }
    #sugar
    {
        color: red;
    }
            </style>
        </head>
        <body>
            <h2>Ingredients for Biryani</h2>
            <ul type="disc" class="items">
                <li>Rice</li>
                <li>Chicken
                    <ul type="circle" class="chicken">
                        <li>Fried</li>
                        <li>Grilled</li>
                        <li>Roasted</li>
                    </ul>
                </li>
                <li id="paneer">Paneer</li>
            </ul>

            <h2>Fighter Jet</h2>
            <ul type="disc" class="items">
                <li>Spices</li>
                <li>Gas/Electric</li>
            </ul>

            <h2>Ingredients for Lassi</h2>
            <ul type="disc" id="lassi">
                <li>Curd</li>
                <li>Water</li>
                <li>Sugar
                    <ul type="circle" id="sugar">
                        <li>White Sugar</li>
                        <li>Brown Sugar</li>
                    </ul>
                </li>
                <li>Malai</li>
                <li>Kova</li>
            </ul>
        </body>
    </html>
